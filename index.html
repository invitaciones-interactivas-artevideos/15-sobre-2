<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invitación Premium</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Allura&family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&family=Forum&family=Great+Vibes&family=Jost:wght@300;400;500;600&family=Marcellus&family=Montserrat:wght@300;400;500;600;700&family=Parisienne&family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&family=Raleway:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #fff8f4;
  --surface: #ffffff;
  --surface-soft: #f8ece9;
  --ink: #2d2426;
  --heading: #6f3b31;
  --muted: #7d696c;
  --accent: #b86f79;
  --accent-2: #d7a77f;
  --accent-3: #738c74;
  --button-bg: #2d2426;
  --button-text: #ffffff;
  --line: rgba(45, 36, 38, 0.16);
  --shadow: rgba(45, 36, 38, 0.16);
  --glow: rgba(184, 111, 121, 0.22);
  --title-font: "Cormorant Garamond", serif;
  --script-font: "Parisienne", cursive;
  --body-font: "Jost", sans-serif;
  --title-size: 3rem;
  --body-size: 1rem;
  --button-font-size: 0.78rem;
  --button-radius: 999px;
  --button-padding-y: 0.92rem;
  --button-padding-x: 1.25rem;
  --section-space: 5.5rem;
  --content-width: 1040px;
  --hero-image-size: 245px;
  --hero-y: 0px;
  --hero-x: 0px;
  --deco-scale: 1;
  --envelope-w: min(82vw, 430px);
  --envelope-h: 270px;
  --envelope-color: #f6dfd8;
  --envelope-lining: #fff7f2;
  --seal-color: #b86f79;
  --seal-text: #fffdf9;
  --radius: 8px;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.72), transparent 34%),
    radial-gradient(circle at top left, var(--glow), transparent 30%),
    linear-gradient(180deg, var(--bg), var(--surface-soft));
  color: var(--ink);
  font-family: var(--body-font);
  font-size: var(--body-size);
  line-height: 1.65;
  overflow-x: hidden;
}

body.bloqueado {
  overflow: hidden;
}

button,
a {
  -webkit-tap-highlight-color: transparent;
}

img {
  max-width: 100%;
  display: block;
}

.entrada {
  position: fixed;
  inset: 0;
  z-index: 9000;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at 18% 16%, rgba(255,255,255,0.88), transparent 24%),
    radial-gradient(circle at 84% 72%, var(--glow), transparent 30%),
    linear-gradient(145deg, var(--bg), var(--surface-soft) 62%, var(--surface));
  transition: opacity 0.8s ease, visibility 0.8s ease;
}

.entrada.oculta {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}

.entrada-deco {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.entrada-deco .motif {
  position: absolute;
  width: calc(210px * var(--deco-scale));
  color: var(--accent);
  opacity: 0.15;
  animation: flotar 8s ease-in-out infinite;
}

.entrada-deco .motif:nth-child(1) {
  top: 7%;
  left: 5%;
  transform: rotate(-18deg);
}

.entrada-deco .motif:nth-child(2) {
  right: 3%;
  bottom: 6%;
  color: var(--accent-2);
  animation-delay: -3s;
  transform: rotate(14deg);
}

.sobre-wrap {
  width: min(560px, 100%);
  text-align: center;
  position: relative;
}

.sobre-copy {
  margin-bottom: 24px;
  opacity: 0;
  animation: subir 0.9s ease 0.25s forwards;
}

.sobre-copy .mini {
  margin: 0 0 6px;
  color: var(--accent);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.sobre-copy h1 {
  margin: 0;
  font-family: var(--script-font);
  font-size: clamp(3rem, 14vw, 5.8rem);
  line-height: 0.9;
  color: var(--ink);
  font-weight: 400;
}

.sobre-copy p {
  margin: 12px auto 0;
  max-width: 360px;
  color: var(--muted);
}

.sobre {
  width: var(--envelope-w);
  height: var(--envelope-h);
  margin: 0 auto;
  position: relative;
  perspective: 1200px;
  filter: drop-shadow(0 26px 40px rgba(45, 36, 38, 0.24));
  animation: aparecerSobre 1s ease forwards;
}

.sobre-base,
.sobre-solapa,
.sobre-bolsillo,
.sobre-carta {
  position: absolute;
  inset: 0;
}

.sobre-base {
  border-radius: var(--radius);
  background:
    linear-gradient(145deg, rgba(255,255,255,0.42), transparent 34%),
    var(--envelope-color);
  border: 1px solid rgba(255,255,255,0.72);
}

.sobre-carta {
  width: 82%;
  height: 82%;
  left: 9%;
  top: 10%;
  border-radius: var(--radius);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.78)),
    var(--envelope-lining);
  border: 1px solid rgba(45,36,38,0.08);
  display: grid;
  place-items: center;
  padding: 24px;
  transform: translateY(34px);
  transition: transform 1s ease 0.22s;
}

.sobre-carta span {
  display: block;
  font-family: var(--title-font);
  font-size: clamp(1.8rem, 9vw, 3rem);
  line-height: 1;
  color: var(--accent);
}

.sobre-carta small {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.72rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.sobre-solapa {
  clip-path: polygon(0 0, 100% 0, 50% 62%);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.52), transparent 54%),
    var(--envelope-color);
  border-radius: var(--radius);
  transform-origin: top center;
  transition: transform 0.95s cubic-bezier(.2,.72,.18,1), filter 0.95s ease;
  z-index: 5;
}

.sobre-bolsillo {
  z-index: 6;
}

.sobre-bolsillo::before,
.sobre-bolsillo::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 50.5%;
  height: 100%;
  background: var(--envelope-color);
}

.sobre-bolsillo::before {
  left: 0;
  clip-path: polygon(0 20%, 100% 57%, 100% 100%, 0 100%);
  border-bottom-left-radius: var(--radius);
}

.sobre-bolsillo::after {
  right: 0;
  clip-path: polygon(100% 20%, 0 57%, 0 100%, 100% 100%);
  border-bottom-right-radius: var(--radius);
}

.sello {
  position: absolute;
  z-index: 8;
  left: 50%;
  top: 54%;
  transform: translate(-50%, -50%);
  width: 92px;
  height: 92px;
  border: 0;
  border-radius: 50%;
  color: var(--seal-text);
  background:
    radial-gradient(circle at 35% 30%, rgba(255,255,255,0.36), transparent 24%),
    var(--seal-color);
  box-shadow:
    0 14px 26px rgba(45,36,38,0.22),
    inset 0 0 0 1px rgba(255,255,255,0.32),
    inset 0 0 0 8px rgba(255,255,255,0.08);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-family: var(--title-font);
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: transform 0.25s ease, filter 0.25s ease;
}

.sello:hover {
  transform: translate(-50%, -50%) scale(1.04);
  filter: brightness(1.04);
}

.sobre.abierto .sobre-solapa {
  transform: rotateX(178deg);
  filter: brightness(1.06);
}

.sobre.abierto .sobre-carta {
  transform: translateY(-138px);
}

.sobre.abierto .sello {
  transform: translate(-50%, -50%) scale(0.75);
  opacity: 0;
  pointer-events: none;
}

.app {
  min-height: 100vh;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.8s ease;
}

.app.visible {
  opacity: 1;
  visibility: visible;
}

.music-control {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 5000;
  width: 50px;
  height: 50px;
  border: 1px solid rgba(255,255,255,0.72);
  border-radius: 50%;
  background: color-mix(in srgb, var(--surface) 88%, transparent);
  color: var(--accent);
  box-shadow: 0 14px 36px var(--shadow);
  display: grid;
  place-items: center;
  cursor: pointer;
  backdrop-filter: blur(16px);
}

.music-control svg {
  width: 22px;
  height: 22px;
}

.music-control.reproduciendo {
  color: var(--button-text);
  background: var(--button-bg);
}

.hero {
  position: relative;
  min-height: 96svh;
  padding: 48px 18px 82px;
  display: grid;
  align-items: center;
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, color-mix(in srgb, var(--surface) 75%, transparent) 0 44%, transparent 44%),
    radial-gradient(circle at 78% 18%, var(--glow), transparent 28%);
  pointer-events: none;
}

.hero-grid {
  position: relative;
  z-index: 2;
  width: min(var(--content-width), 100%);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 0.92fr 1.08fr;
  gap: clamp(28px, 6vw, 72px);
  align-items: center;
  transform: translate(var(--hero-x), var(--hero-y));
}

.portrait-stage {
  min-height: 470px;
  position: relative;
  display: grid;
  place-items: center;
}

.portrait-ring {
  width: min(var(--hero-image-size), 72vw);
  aspect-ratio: 1;
  border-radius: 50%;
  padding: 10px;
  background:
    conic-gradient(from 90deg, var(--accent), var(--accent-2), var(--accent-3), var(--accent));
  box-shadow: 0 28px 58px var(--shadow);
  position: relative;
}

.portrait-ring::before {
  content: "";
  position: absolute;
  inset: -36px;
  border: 1px solid var(--line);
  border-radius: 46% 54% 50% 50%;
  transform: rotate(-12deg);
}

.portrait-ring::after {
  content: "";
  position: absolute;
  inset: -70px -48px;
  border: 1px solid color-mix(in srgb, var(--accent) 42%, transparent);
  border-radius: 55% 45% 46% 54%;
  transform: rotate(18deg);
}

.portrait-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, var(--surface)), var(--surface-soft));
  border: 8px solid var(--surface);
}

.portrait-img[src=""] {
  display: none;
}

.portrait-fallback {
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 26px;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.82), transparent 34%),
    linear-gradient(135deg, var(--surface), var(--surface-soft));
  color: var(--accent);
  font-family: var(--script-font);
  font-size: clamp(4.8rem, 12vw, 7.2rem);
  line-height: 0.82;
}

.portrait-deco {
  position: absolute;
  width: calc(170px * var(--deco-scale));
  color: var(--accent);
  opacity: 0.78;
  pointer-events: none;
}

.portrait-deco.deco-a {
  top: 42px;
  right: 18px;
  animation: flotar 6.5s ease-in-out infinite;
}

.portrait-deco.deco-b {
  left: 0;
  bottom: 48px;
  width: calc(128px * var(--deco-scale));
  color: var(--accent-2);
  animation: flotar 7.4s ease-in-out -2s infinite;
}

.hero-copy {
  position: relative;
  padding-left: clamp(0px, 2vw, 30px);
}

.eyebrow {
  margin: 0 0 12px;
  color: var(--accent);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

.nombre {
  margin: 0;
  font-family: var(--script-font);
  font-size: clamp(4.2rem, 13vw, 8.2rem);
  line-height: 0.82;
  color: var(--ink);
  font-weight: 400;
}

.subtitulo {
  margin: 18px 0 0;
  font-family: var(--title-font);
  font-size: clamp(1.8rem, 4.4vw, 3.2rem);
  line-height: 1;
  color: var(--accent);
}

.hero-text {
  width: min(570px, 100%);
  margin: 24px 0 0;
  color: var(--muted);
  font-size: clamp(1rem, 2.5vw, 1.16rem);
}

.hero-actions,
.button-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  margin-top: 28px;
}

.btn {
  border: 1px solid color-mix(in srgb, var(--button-bg) 12%, transparent);
  border-radius: var(--button-radius);
  padding: var(--button-padding-y) var(--button-padding-x);
  min-height: 45px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 9px;
  background: var(--button-bg);
  color: var(--button-text);
  box-shadow: 0 13px 30px color-mix(in srgb, var(--button-bg) 20%, transparent);
  cursor: pointer;
  text-decoration: none;
  font-family: var(--body-font);
  font-size: var(--button-font-size);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
}

.btn svg {
  width: 18px;
  height: 18px;
  flex: 0 0 auto;
}

.btn:hover {
  transform: translateY(-2px);
  filter: brightness(1.05);
  box-shadow: 0 17px 36px color-mix(in srgb, var(--button-bg) 24%, transparent);
}

.btn.secundario {
  color: var(--ink);
  background: color-mix(in srgb, var(--surface) 78%, transparent);
  border-color: var(--line);
  box-shadow: none;
}

.scroll-mark {
  position: absolute;
  left: 50%;
  bottom: 24px;
  z-index: 3;
  color: var(--accent);
  transform: translateX(-50%);
  animation: bounce 1.7s infinite;
}

.section {
  position: relative;
  padding: var(--section-space) 18px;
  overflow: hidden;
}

.section:nth-of-type(odd) {
  background: color-mix(in srgb, var(--surface) 78%, var(--bg));
}

.section-inner {
  width: min(var(--content-width), 100%);
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.section-head {
  max-width: 690px;
  margin-bottom: 32px;
}

.section-kicker {
  margin: 0 0 10px;
  color: var(--accent);
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 0.22em;
  text-transform: uppercase;
}

h2 {
  margin: 0;
  font-family: var(--title-font);
  font-size: clamp(2.45rem, 7vw, var(--title-size));
  line-height: 0.98;
  color: var(--heading);
  font-weight: 600;
}

.lead {
  margin: 18px 0 0;
  color: var(--muted);
  font-size: clamp(1rem, 2.5vw, 1.13rem);
}

.story {
  display: grid;
  grid-template-columns: 0.85fr 1.15fr;
  gap: clamp(24px, 6vw, 60px);
  align-items: center;
}

.quote-mark {
  font-family: var(--script-font);
  font-size: clamp(4.2rem, 10vw, 7rem);
  line-height: 0.78;
  color: var(--accent);
}

.story-panel {
  border-left: 1px solid var(--line);
  padding-left: clamp(22px, 4vw, 42px);
}

.countdown-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 26px;
}

.count-item,
.event-item,
.detail-item {
  background: color-mix(in srgb, var(--surface) 84%, transparent);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: 0 18px 42px var(--shadow);
}

.count-item {
  min-height: 126px;
  padding: 20px 10px;
  display: grid;
  place-items: center;
  text-align: center;
}

.count-num {
  display: block;
  font-family: var(--title-font);
  font-size: clamp(2rem, 8vw, 4rem);
  line-height: 0.9;
  color: var(--accent);
}

.count-label {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.event-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.event-item {
  padding: clamp(24px, 5vw, 36px);
  min-height: 260px;
  position: relative;
  overflow: hidden;
}

.event-item::after {
  content: "";
  position: absolute;
  right: -42px;
  bottom: -42px;
  width: 150px;
  height: 150px;
  border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
  border-radius: 50%;
}

.event-title {
  margin: 0 0 18px;
  font-family: var(--title-font);
  font-size: clamp(2rem, 6vw, 3.1rem);
  color: var(--heading);
  line-height: 1;
}

.event-data {
  margin: 0 0 8px;
  color: var(--ink);
  font-weight: 600;
}

.event-address {
  margin: 0;
  color: var(--muted);
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 16px;
}

.detail-item {
  min-height: 240px;
  padding: 28px;
}

.detail-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  margin-bottom: 18px;
  background: color-mix(in srgb, var(--accent) 14%, var(--surface));
  color: var(--accent);
}

.detail-icon svg {
  width: 23px;
  height: 23px;
}

.detail-item h3 {
  margin: 0 0 10px;
  font-family: var(--title-font);
  font-size: 2rem;
  line-height: 1;
  color: var(--heading);
}

.detail-item p {
  margin: 0;
  color: var(--muted);
}

.carousel-shell {
  position: relative;
}

.carousel {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: var(--surface);
  box-shadow: 0 24px 58px var(--shadow);
}

.carousel-track {
  display: flex;
  transition: transform 0.65s cubic-bezier(.2,.7,.2,1);
}

.slide {
  min-width: 100%;
  height: min(68vh, 620px);
  position: relative;
  background: var(--surface-soft);
  overflow: hidden;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.slide::after {
  content: "";
  position: absolute;
  inset: auto 0 0;
  height: 34%;
  background: linear-gradient(0deg, rgba(0,0,0,0.42), transparent);
  pointer-events: none;
}

.slide-caption {
  position: absolute;
  left: 22px;
  bottom: 18px;
  z-index: 1;
  color: #fff;
  font-size: 0.76rem;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  text-shadow: 0 2px 10px rgba(0,0,0,0.36);
}

.placeholder-photo {
  height: 100%;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 28px;
  color: var(--accent);
  background:
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.78), transparent 28%),
    linear-gradient(145deg, color-mix(in srgb, var(--accent) 18%, var(--surface)), var(--surface-soft));
  font-family: var(--title-font);
  font-size: clamp(2rem, 8vw, 4.2rem);
}

.carousel-btn {
  position: absolute;
  top: 50%;
  z-index: 3;
  width: 48px;
  height: 48px;
  border: 1px solid rgba(255,255,255,0.68);
  border-radius: 50%;
  background: rgba(255,255,255,0.84);
  color: var(--ink);
  display: grid;
  place-items: center;
  cursor: pointer;
  transform: translateY(-50%);
  box-shadow: 0 12px 26px rgba(0,0,0,0.18);
}

.carousel-btn svg {
  width: 22px;
  height: 22px;
}

.carousel-btn.prev {
  left: 16px;
}

.carousel-btn.next {
  right: 16px;
}

.dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 18px;
}

.dots button {
  width: 8px;
  height: 8px;
  padding: 0;
  border: 0;
  border-radius: 50%;
  background: color-mix(in srgb, var(--accent) 28%, var(--surface));
  cursor: pointer;
}

.dots button.activo {
  width: 30px;
  border-radius: 999px;
  background: var(--accent);
}

.closing {
  min-height: 72vh;
  display: grid;
  align-items: center;
  text-align: center;
  background:
    radial-gradient(circle at 50% 20%, var(--glow), transparent 36%),
    linear-gradient(180deg, var(--surface), var(--bg));
}

.closing h2 {
  font-family: var(--script-font);
  font-weight: 400;
  color: var(--heading);

.closing .lead {

.deco-corner {
  position: absolute;
  pointer-events: none;
  width: calc(260px * var(--deco-scale));
  color: var(--accent);
  opacity: 0.11;
}

.deco-corner.left {
  left: -70px;
  top: 26px;
  transform: rotate(-14deg);
}

.deco-corner.right {
  right: -70px;
  bottom: 12px;
  color: var(--accent-2);
  transform: rotate(18deg);
}

.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

.lightbox {
  position: fixed;
  inset: 0;
  z-index: 7000;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(20, 16, 18, 0.86);
}

.lightbox.visible {
  display: grid;
}

.lightbox img {
  width: min(92vw, 980px);
  max-height: 84vh;
  object-fit: contain;
  border-radius: var(--radius);
  box-shadow: 0 26px 70px rgba(0,0,0,0.36);
}

.lightbox button {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 46px;
  height: 46px;
  border: 1px solid rgba(255,255,255,0.42);
  border-radius: 50%;
  color: #fff;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
}

.gift-modal {
  position: fixed;
  inset: 0;
  z-index: 7200;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(20, 16, 18, 0.74);
  backdrop-filter: blur(14px);
}

.gift-modal.visible {
  display: grid;
}

.gift-panel {
  width: min(92vw, 520px);
  max-height: 86vh;
  overflow: auto;
  border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.54);
  background:

  padding: clamp(24px, 5vw, 36px);

}

.gift-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 40px;
  height: 40px;
  border: 1px solid var(--line);

}

.gift-panel h2 {
  padding-right: 42px;

}

.gift-panel .lead {

}

.gift-data {
  display: grid;
  gap: 10px;

}

.gift-row {
  display: grid;

  border-radius: var(--radius);
  background: color-mix(in srgb, var(--surface-soft) 42%, var(--surface));
}

.gift-label {
  color: var(--accent);
  font-size: 0.68rem;

  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.gift-value {
  color: var(--ink);

}

.toast {
  position: fixed;
  left: 50%;
  bottom: 82px;
  z-index: 8000;
  transform: translateX(-50%) translateY(20px);
  opacity: 0;
  pointer-events: none;
  padding: 10px 18px;
  border-radius: 999px;
  background: var(--ink);
  color: #fff;
  font-size: 0.83rem;
  box-shadow: 0 18px 40px var(--shadow);

.toast.visible {

[hidden] {

}

@keyframes aparecerSobre {
  from { opacity: 0; transform: translateY(18px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }

@keyframes subir {
  from { opacity: 0; transform: translateY(14px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes flotar {
  0%, 100% { translate: 0 0; }
  50% { translate: 0 -14px; }

@keyframes bounce {
  0%, 100% { transform: translate(-50%, 0); opacity: 0.42; }

};

const $ = (id) => document.getElementById(id);

function textoSeguro(valor) {
  return String(valor ?? "").replace(/[&<>"']/g, (letra) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
  }[letra]));
}

function setText(id, valor) {
  const el = $(id);
  if (el) el.textContent = valor ?? "";
}

function setHTML(id, valor) {
  const el = $(id);
  if (el) el.innerHTML = valor ?? "";
}

function cssVar(nombre, valor) {
  if (valor !== undefined && valor !== null && valor !== "") {
    document.documentElement.style.setProperty(nombre, valor);
  }
}

function whatsappLink(mensaje) {
  return `https://wa.me/${CONFIG.enlaces.whatsappNumero}?text=${encodeURIComponent(mensaje)}`;
}

function aplicarDiseno() {
  const paleta = PALETAS[CONFIG.diseno.paleta] || PALETAS.rosa_perla;
  const fuentes = FUENTES[CONFIG.diseno.fuentes] || FUENTES.editorial;
  cssVar("--bg", paleta.bg);
  cssVar("--surface", paleta.surface);
  cssVar("--surface-soft", paleta.surfaceSoft);
  cssVar("--ink", paleta.ink);
  cssVar("--heading", CONFIG.diseno.colorTitulos || paleta.heading);
  cssVar("--muted", paleta.muted);
  cssVar("--accent", paleta.accent);
  cssVar("--accent-2", paleta.accent2);
  cssVar("--accent-3", paleta.accent3);
  cssVar("--button-bg", paleta.buttonBg);
  cssVar("--button-text", paleta.buttonText);
  cssVar("--line", paleta.line);
  cssVar("--shadow", paleta.shadow);
  cssVar("--glow", paleta.glow);
  cssVar("--title-font", fuentes.title);
  cssVar("--script-font", fuentes.script);
  cssVar("--body-font", fuentes.body);
  cssVar("--title-size", CONFIG.diseno.tamañoTitulo);
  cssVar("--body-size", CONFIG.diseno.tamañoTexto);
  cssVar("--button-font-size", CONFIG.diseno.tamañoBoton);
  cssVar("--button-radius", CONFIG.diseno.bordeBoton);
  cssVar("--button-padding-y", CONFIG.diseno.altoBoton);
  cssVar("--button-padding-x", CONFIG.diseno.anchoBoton);
  cssVar("--radius", CONFIG.diseno.radioBordes);
  cssVar("--content-width", CONFIG.diseno.anchoContenido);
  cssVar("--section-space", CONFIG.diseno.espacioSecciones);
  cssVar("--hero-image-size", CONFIG.diseno.tamañoFotoPortada);
  cssVar("--hero-x", CONFIG.diseno.moverPortadaDerechaIzquierda);
  cssVar("--hero-y", CONFIG.diseno.moverPortadaArribaAbajo);
  cssVar("--deco-scale", CONFIG.diseno.tamañoDibujos);
  cssVar("--envelope-color", CONFIG.diseno.colorSobre);
  cssVar("--envelope-lining", CONFIG.diseno.interiorSobre);
  cssVar("--seal-color", CONFIG.diseno.colorLacre);
  cssVar("--seal-text", CONFIG.diseno.colorTextoLacre);
}

function aplicarMotivos() {
  const motivo = MOTIVOS[CONFIG.diseno.tema] || MOTIVOS.floral;
  const motivoChico = MOTIVOS[CONFIG.diseno.tema === "floral" ? "mariposas" : CONFIG.diseno.tema] || motivo;
  document.querySelectorAll("[data-motif]").forEach((el) => { el.innerHTML = motivo; });
  document.querySelectorAll("[data-motif-small]").forEach((el) => { el.innerHTML = motivoChico; });
  $("entradaDeco").innerHTML = `<div class="motif">${motivo}</div><div class="motif">${motivoChico}</div>`;
}

function aplicarTextos() {
  setText("entradaMini", CONFIG.evento.celebracion);
  setText("entradaNombre", CONFIG.evento.nombre);
  setText("entradaTexto", CONFIG.evento.textoPortada);
  setText("sobreInicial", CONFIG.evento.iniciales || CONFIG.evento.nombre.charAt(0));
  setText("sobreFecha", CONFIG.evento.fechaTexto);
  setText("heroEyebrow", CONFIG.evento.celebracion);
  setText("heroName", CONFIG.evento.nombre);
  setText("heroSubtitle", CONFIG.evento.frasePortada);
  setText("heroText", CONFIG.evento.textoInicio);
 $("heroPrimary").hidden = CONFIG.portada.mostrarBotonPrincipal === false;
$("heroSecondary").hidden = CONFIG.portada.mostrarBotonSecundario === false;

$("heroPrimary").innerHTML = `${ICONOS.flecha}<span>${textoSeguro(CONFIG.portada.textoBotonPrincipal)}</span>`;
$("heroSecondary").innerHTML = `${ICONOS.flecha}<span>${textoSeguro(CONFIG.portada.textoBotonSecundario)}</span>`;
  setText("storyKicker", CONFIG.secciones.historiaKicker);
  setText("storyQuoteMark", "“");
  setText("storyTitle", CONFIG.secciones.historiaTitulo);
  setText("storyText", CONFIG.secciones.historiaTexto);
  setText("countKicker", CONFIG.secciones.cuentaKicker);
  setText("countTitle", CONFIG.secciones.cuentaTitulo);
  setText("countText", CONFIG.secciones.cuentaTexto);
  setText("eventKicker", CONFIG.secciones.eventoKicker);
  setText("eventTitle", CONFIG.secciones.eventoTitulo);
  setText("eventText", CONFIG.secciones.eventoTexto);
  setText("detailsKicker", CONFIG.secciones.detallesKicker);
  setText("detailsTitle", CONFIG.secciones.detallesTitulo);
  setText("galleryKicker", CONFIG.secciones.galeriaKicker);
  setText("galleryTitle", CONFIG.secciones.galeriaTitulo);
  setText("galleryText", CONFIG.secciones.galeriaTexto);
  setText("closingKicker", CONFIG.secciones.cierreKicker);
  setText("closingTitle", CONFIG.secciones.cierreTitulo);
  setText("closingText", CONFIG.evento.textoCierre);
}

function aplicarPortada() {
  const img = $("coverImage");
  const fallback = $("coverFallback");
  fallback.textContent = CONFIG.evento.iniciales || CONFIG.evento.nombre.charAt(0);
  const modo = CONFIG.portada.modoCirculo || (CONFIG.portada.usarFoto ? "foto" : "inicial");
  const foto = CONFIG.portada.fotoCirculo || CONFIG.portada.foto;
  if (modo !== "foto" || !foto) {
    img.removeAttribute("src");
    img.style.display = "none";
    fallback.hidden = false;
    return;
  }
  img.src = foto;
  img.style.objectPosition = CONFIG.portada.posicionFoto || "center center";
  img.onload = () => { img.style.display = "block"; fallback.hidden = true; };
  img.onerror = () => { img.style.display = "none"; fallback.hidden = false; };
}

function crearEventos() {
  const grid = $("eventGrid");
  const eventos = CONFIG.eventos ? Object.values(CONFIG.eventos) : (CONFIG.lugares || []);
  grid.innerHTML = "";
  eventos.filter((lugar) => lugar.mostrar).forEach((lugar) => {
    const item = document.createElement("article");
    item.className = "event-item";
    item.innerHTML = `
      <h3 class="event-title">${textoSeguro(lugar.titulo)}</h3>
      <p class="event-data">${textoSeguro(lugar.fecha)} · ${textoSeguro(lugar.hora)}</p>
      <p class="event-data">${textoSeguro(lugar.lugar)}</p>
      <p class="event-address">${textoSeguro(lugar.direccion)}</p>
      <div class="button-row">
        <a class="btn secundario" href="${textoSeguro(lugar.mapa)}" target="_blank" rel="noopener">${ICONOS.mapa}<span>Ver ubicación</span></a>
      </div>`;
    grid.appendChild(item);
  });
}

function crearDetalles() {
  const grid = $("detailGrid");
  const detalles = [
    {
      titulo: CONFIG.dressCode.titulo,
      texto: CONFIG.dressCode.texto,
      icono: ICONOS.vestir,
      boton: ""
    },
    {
      titulo: "Playlist",
      texto: CONFIG.enlaces.playlistTexto,
      icono: ICONOS.musica,
      boton: `<a class="btn secundario" href="${textoSeguro(CONFIG.enlaces.playlistGoogleForm)}" target="_blank" rel="noopener">Sugerir canción</a>`
    },
    {
      titulo: "Confirmación",
      texto: "Avisame si vas a acompañarme para preparar todo con mucho cariño.",
      icono: ICONOS.whatsapp,
      boton: `<a class="btn secundario" href="${whatsappLink(CONFIG.enlaces.whatsappMensaje)}" target="_blank" rel="noopener">Confirmar</a>`
    }
  ];

  if (CONFIG.regalo && CONFIG.regalo.mostrar) {
    detalles.push({
      titulo: "Regalo",
      texto: CONFIG.regalo.textoSeccion,
      icono: ICONOS.regalo,
      boton: `<button class="btn secundario" type="button" onclick="abrirRegalo()">Consultar datos</button>`
    });
  }

  grid.innerHTML = detalles.map((item) => `
    <article class="detail-item">
      <div class="detail-icon">${item.icono}</div>
      <h3>${textoSeguro(item.titulo)}</h3>
      <p>${textoSeguro(item.texto)}</p>
      ${item.boton ? `<div class="button-row">${item.boton}</div>` : ""}
    </article>
  `).join("");
}

let fotoActual = 0;
let carruselTimer = null;

function crearGaleria() {
  const track = $("carouselTrack");
  const dots = $("carouselDots");
  const fotos = CONFIG.galeria.fotos.length ? CONFIG.galeria.fotos : ["foto1.jpg"];
  track.innerHTML = "";
  dots.innerHTML = "";

  fotos.forEach((foto, index) => {
    const slide = document.createElement("div");
    slide.className = "slide";
    slide.innerHTML = `
      <img src="${textoSeguro(foto)}" alt="Foto ${index + 1}" loading="${index === 0 ? "eager" : "lazy"}">
      <div class="placeholder-photo" hidden>${textoSeguro(CONFIG.evento.nombre)}</div>
      <div class="slide-caption">Foto ${index + 1}</div>`;
    const img = slide.querySelector("img");
    const fallback = slide.querySelector(".placeholder-photo");
    img.addEventListener("error", () => {
      img.hidden = true;
      fallback.hidden = false;
    });
    slide.addEventListener("click", () => abrirLightbox(foto));
    track.appendChild(slide);

    const dot = document.createElement("button");
    dot.type = "button";
    dot.setAttribute("aria-label", `Ir a foto ${index + 1}`);
    dot.addEventListener("click", () => irFoto(index));
    dots.appendChild(dot);
  });

  $("prevPhoto").onclick = () => cambiarFoto(-1);
  $("nextPhoto").onclick = () => cambiarFoto(1);
  irFoto(0);
  iniciarCarrusel();

  let startX = 0;
  track.addEventListener("touchstart", (event) => { startX = event.touches[0].clientX; }, { passive: true });
  track.addEventListener("touchend", (event) => {
    const distancia = event.changedTouches[0].clientX - startX;
    if (Math.abs(distancia) > 38) cambiarFoto(distancia > 0 ? -1 : 1);
  }, { passive: true });
}

function irFoto(index) {
  const total = CONFIG.galeria.fotos.length || 1;
  fotoActual = (index + total) % total;
  $("carouselTrack").style.transform = `translateX(-${fotoActual * 100}%)`;
  [...$("carouselDots").children].forEach((dot, i) => dot.classList.toggle("activo", i === fotoActual));
  iniciarCarrusel();
}

function cambiarFoto(direccion) {
  irFoto(fotoActual + direccion);
}

function iniciarCarrusel() {
  clearInterval(carruselTimer);
  const segundos = Number(CONFIG.galeria.segundosEntreFotos || 4);
  carruselTimer = setInterval(() => cambiarFoto(1), Math.max(segundos, 1) * 1000);
}

function abrirLightbox(src) {
  const img = $("lightboxImage");
  img.src = src;
  img.onerror = () => mostrarToast("La foto todavía no está cargada en el repositorio.");
  $("lightbox").classList.add("visible");
}

function cerrarLightbox() {
  $("lightbox").classList.remove("visible");
  $("lightboxImage").removeAttribute("src");
}

function configurarRegalo() {
  if (!CONFIG.regalo) return;
  setText("giftKicker", "Regalo");
  setText("giftTitle", CONFIG.regalo.titulo);
  setText("giftIntro", CONFIG.regalo.textoModal);
  const filas = [
    { etiqueta: "Cuenta bancaria", valor: CONFIG.regalo.cuentaBancaria },
    { etiqueta: "Nombre del titular", valor: CONFIG.regalo.titular },
    { etiqueta: "CI", valor: CONFIG.regalo.ci },
    ...(CONFIG.regalo.datosExtra || [])
  ].filter((dato) => dato && dato.mostrar !== false && dato.valor);

  $("giftData").innerHTML = filas.map((dato) => `
    <div class="gift-row">
      <span class="gift-label">${textoSeguro(dato.etiqueta)}</span>
      <span class="gift-value">${textoSeguro(dato.valor)}</span>
    </div>
  `).join("");
}

function abrirRegalo() {
  configurarRegalo();
  $("giftModal").classList.add("visible");
}

function cerrarRegalo() {
  $("giftModal").classList.remove("visible");
}

function mostrarToast(mensaje) {
  const toast = $("toast");
  toast.textContent = mensaje;
  toast.classList.add("visible");
  setTimeout(() => toast.classList.remove("visible"), 2300);
}

function actualizarCuenta() {
  const objetivo = new Date(CONFIG.evento.fechaCuentaRegresiva).getTime();
  const restante = Math.max(objetivo - Date.now(), 0);
  const dias = Math.floor(restante / 86400000);
  const horas = Math.floor((restante % 86400000) / 3600000);
  const minutos = Math.floor((restante % 3600000) / 60000);
  const segundos = Math.floor((restante % 60000) / 1000);
  setText("days", String(dias).padStart(2, "0"));
  setText("hours", String(horas).padStart(2, "0"));
  setText("minutes", String(minutos).padStart(2, "0"));
  setText("seconds", String(segundos).padStart(2, "0"));
}

function configurarMusica() {
  const musica = $("musica");
  musica.src = CONFIG.musica.archivo;
  musica.volume = Math.min(Math.max(Number(CONFIG.musica.volumen || 0.7), 0), 1);
  $("musicControl").innerHTML = ICONOS.musica;
  $("musicControl").addEventListener("click", alternarMusica);
  musica.addEventListener("play", () => $("musicControl").classList.add("reproduciendo"));
  musica.addEventListener("pause", () => $("musicControl").classList.remove("reproduciendo"));
}

function intentarMusica() {
  if (!CONFIG.musica.intentarAutoplay) return;
  $("musica").play().catch(() => {});
}

function alternarMusica() {
  const musica = $("musica");
  if (musica.paused) {
    musica.play().catch(() => mostrarToast("Tocá nuevamente para activar la música."));
  } else {
    musica.pause();
  }
}

function abrirInvitacion() {
  $("sobre").classList.add("abierto");
  intentarMusica();
  setTimeout(() => {
    $("entrada").classList.add("oculta");
    $("app").classList.add("visible");
    document.body.classList.remove("bloqueado");
    window.scrollTo({ top: 0, behavior: "auto" });
  }, 1050);
}

function prepararRevelado() {
  const obs = new IntersectionObserver((entradas) => {
    entradas.forEach((entrada) => {
      if (entrada.isIntersecting) entrada.target.classList.add("visible");
    });
  }, { threshold: 0.16 });
  document.querySelectorAll(".reveal").forEach((el) => obs.observe(el));
}

function iniciar() {
  aplicarDiseno();
  aplicarMotivos();
  aplicarTextos();
  aplicarPortada();
  crearEventos();
  crearDetalles();
  crearGaleria();
  configurarRegalo();
  configurarMusica();
  actualizarCuenta();
  prepararRevelado();
  setInterval(actualizarCuenta, 1000);
  $("abrirInvitacion").addEventListener("click", abrirInvitacion);
  $("closeLightbox").addEventListener("click", cerrarLightbox);
  $("closeGift").addEventListener("click", cerrarRegalo);
  $("lightbox").addEventListener("click", (event) => {
    if (event.target.id === "lightbox") cerrarLightbox();
  });
  $("giftModal").addEventListener("click", (event) => {
    if (event.target.id === "giftModal") cerrarRegalo();
  });
  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape") cerrarLightbox();
    if (event.key === "Escape") cerrarRegalo();
    if (event.key === "ArrowRight") cambiarFoto(1);
    if (event.key === "ArrowLeft") cambiarFoto(-1);
  });
}

document.addEventListener("DOMContentLoaded", iniciar);
</script>
</body>
</html>
